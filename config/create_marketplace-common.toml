#Settings for Create: Marketplace
[general]
	#Waypoint symbol display mode (Xaero's Minimap)
	#ICON - Uses a shopping cart icon (🛒)
	#FIRST_LETTER - Uses the first letter of the shop name
	#CUSTOM - Uses a custom symbol defined below
	#Allowed Values: ICON, FIRST_LETTER, CUSTOM
	waypointSymbolMode = "ICON"
	#Custom waypoint symbol (used only if waypointSymbolMode is set to CUSTOM)
	customWaypointSymbol = "S"
	#Should the Registration Card lose durability on use?
	#If false, the card has infinite uses.
	useCardDurability = false
	#Maximum number of marketplace offers a single player can have.
	#Set to a high value to effectively disable the limit.
	# Default: 100
	# Range: 1 ~ 10000
	maxOffersPerPlayer = 100
